[metadata]
name = "sentiment"
description = "Classify developer message tone: positive, negative, or neutral"
mode = "multi-category"
threshold = 0.4

[categories.positive]
phrases = [
    "great work on this",
    "this is exactly what I needed",
    "perfect solution",
    "love this approach",
    "clean and elegant code",
    "well done, this looks solid",
]

[categories.negative]
phrases = [
    "this is completely broken",
    "terrible performance",
    "this code is a mess",
    "frustrating bug",
    "this approach won't scale",
    "wasted hours on this",
]

[categories.neutral]
phrases = [
    "the function takes two arguments",
    "I pushed the changes",
    "the test suite runs in 30 seconds",
    "we're using version 3.2",
    "the endpoint returns JSON",
    "the PR has 4 commits",
]
