[metadata]
name = "topic-routing"
description = "Route developer prompts to relevant documentation sections"
mode = "multi-category"
threshold = 0.35

[categories.architecture]
phrases = [
    "system design",
    "module structure",
    "dependency graph",
    "separation of concerns",
    "API layer design",
    "data flow between components",
]

[categories.testing]
phrases = [
    "unit test",
    "integration test",
    "test coverage",
    "mocking dependencies",
    "test fixtures",
    "assertion patterns",
]

[categories.deployment]
phrases = [
    "CI/CD pipeline",
    "container deployment",
    "environment variables",
    "release process",
    "infrastructure setup",
    "monitoring and alerts",
]

[categories.security]
phrases = [
    "authentication",
    "authorization",
    "input validation",
    "SQL injection prevention",
    "secret management",
    "CORS configuration",
]

[categories.performance]
phrases = [
    "query optimization",
    "caching strategy",
    "load balancing",
    "memory usage",
    "response time",
    "database indexing",
]
